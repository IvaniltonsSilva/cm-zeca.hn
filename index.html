<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade do Zeca</title>

    <script>

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];

    fbq('track', 'PageView');

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #020d04;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-box {
            border: 1px solid #4ade80;
            border-radius: 50px;
            padding: 15px 25px;
            margin-bottom: 30px;
            width: 100%;
            background: linear-gradient(180deg, rgba(74, 222, 128, 0.1) 0%, rgba(0,0,0,0) 100%);
        }

        .header-box h2 { font-size: 1.5rem; font-weight: bold; }
        .header-box span { color: #4ade80; font-style: italic; }
        .header-box p { font-size: 0.9rem; margin-top: 5px; opacity: 0.9; }

        .image-wrapper {
            position: relative;
            width: 280px;
            margin-bottom: 20px;
        }

        .image-wrapper img { width: 100%; display: block; z-index: 10; position: relative; }

        .image-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: #4ade80;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 1;
        }

        /* TAMANHO DAS LETRAS REDUZIDO */
        .main-title {
            font-size: 1.35rem; 
            margin-bottom: 22px;
            line-height: 1.2;
            font-weight: bold;
        }

        .highlight-green {
            color: #4ade80;
            font-weight: 800;
        }

        .alert-box {
            background-color: rgba(10, 30, 15, 0.8);
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .alert-box .warning-text {
            color: #4ade80;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .cta-button {
            background-color: #4ade80;
            color: #000 !important;
            text-decoration: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
            display: inline-block;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h2>Comunidade do <span>Zeca</span></h2>
            <p>A maior <b>comunidade gratuita</b> de futebol!</p>
        </div>

        <div class="image-wrapper">
            <img src="1 (1).png" alt="Especialista">
        </div>

        <h1 class="main-title">
            Os melhores palpites do <span class="highlight-green">DIA</span><br>
            estão saindo agora na<br>
            <span class="highlight-green">MINHA COMUNIDADE</span>
        </h1>

        <div class="alert-box">
            <span class="warning-text">⚠️ ENTRE E AGUARDE ⚠️</span>
            <p>As entradas serão enviadas em instantes!</p>
        </div>

        <a href="https://mais.red/run/zecaorganico" class="cta-button" onclick="trackClick()">
            Participar da Comunidade
        </a>
    </div>

    <script>
    function trackClick() {
        fbq('track', 'Subscribe');
        console.log("Lead enviado!");
    }
    </script>

</body>
</html>
